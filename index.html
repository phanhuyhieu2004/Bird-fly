<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird Fly - Relax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Quicksand', sans-serif;
    }

    #sky-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .clouds {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 4px 30px rgba(255,255,255,0.5);
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud-1 { width: 160px; height: 55px; top: 3%; left: 5%; animation: drift1 55s linear infinite; }
    .cloud-1::before { width: 80px; height: 70px; top: -35px; left: 30px; }
    .cloud-1::after { width: 100px; height: 55px; top: -22px; left: 70px; }

    .cloud-2 { width: 200px; height: 70px; top: 8%; left: 30%; animation: drift2 70s linear infinite 10s; }
    .cloud-2::before { width: 100px; height: 80px; top: -40px; left: 40px; }
    .cloud-2::after { width: 120px; height: 70px; top: -30px; left: 90px; }

    .cloud-3 { width: 120px; height: 42px; top: 18%; left: 65%; animation: drift3 60s linear infinite 5s; }
    .cloud-3::before { width: 60px; height: 55px; top: -28px; left: 20px; }
    .cloud-3::after { width: 80px; height: 42px; top: -18px; left: 50px; }

    .cloud-4 { width: 180px; height: 60px; top: 12%; left: 85%; animation: drift1 80s linear infinite 18s; }
    .cloud-4::before { width: 90px; height: 72px; top: -36px; left: 35px; }
    .cloud-4::after { width: 110px; height: 60px; top: -25px; left: 80px; }

    .cloud-5 { width: 100px; height: 38px; top: 28%; left: 15%; animation: drift2 65s linear infinite 25s; }
    .cloud-5::before { width: 50px; height: 48px; top: -24px; left: 15px; }
    .cloud-5::after { width: 65px; height: 38px; top: -14px; left: 40px; }

    .cloud-6 { width: 150px; height: 52px; top: 22%; left: 50%; animation: drift3 75s linear infinite 15s; }
    .cloud-6::before { width: 75px; height: 62px; top: -31px; left: 28px; }
    .cloud-6::after { width: 95px; height: 52px; top: -20px; left: 65px; }

    .cloud-7 { width: 130px; height: 45px; top: 35%; left: 75%; animation: drift1 90s linear infinite 35s; }
    .cloud-7::before { width: 65px; height: 55px; top: -27px; left: 22px; }
    .cloud-7::after { width: 82px; height: 45px; top: -16px; left: 48px; }

    .cloud-8 { width: 90px; height: 34px; top: 40%; left: 40%; animation: drift2 58s linear infinite 45s; }
    .cloud-8::before { width: 45px; height: 42px; top: -21px; left: 12px; }
    .cloud-8::after { width: 58px; height: 34px; top: -12px; left: 35px; }

    @keyframes drift1 { from { transform: translateX(0); } to { transform: translateX(110vw); } }
    @keyframes drift2 { from { transform: translateX(0); } to { transform: translateX(-110vw); } }
    @keyframes drift3 { from { transform: translateX(0); } to { transform: translateX(110vw); } }

    #trail-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    #bird-canvas {
      position: fixed;
      width: 180px;
      height: 180px;
      z-index: 4;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.15));
    }

    @media (max-width: 600px) {
      #bird-canvas {
        width: 120px;
        height: 120px;
      }
    }

    #rive-canvas {
      position: fixed;
      width: 180px;
      height: 180px;
      opacity: 0;
      pointer-events: none;
    }

    .btn-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .action-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: relative;
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .action-btn:active { transform: scale(0.92); }
    .action-btn.active {
      background: rgba(255,220,100,0.35);
      border-color: rgba(255,220,100,0.6);
      box-shadow: 0 0 15px rgba(255,220,100,0.3);
    }
    .action-btn .tip {
      position: absolute;
      right: 58px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      font-family: 'Quicksand', sans-serif;
    }
    .action-btn:hover .tip { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="sky-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>
  <canvas id="click-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;"></canvas>

  <div class="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="cloud cloud-5"></div>
    <div class="cloud cloud-6"></div>
    <div class="cloud cloud-7"></div>
    <div class="cloud cloud-8"></div>
  </div>

  <canvas id="trail-canvas"></canvas>
  <canvas id="bird-canvas"></canvas>
  <canvas id="rive-canvas"></canvas>

  <div class="btn-panel">
    <button class="action-btn" id="spin-btn"><i class="fas fa-sync-alt"></i><span class="tip">Xoay chim</span></button>
    <button class="action-btn" id="burst-btn"><i class="fas fa-fire"></i><span class="tip">Pháo hoa</span></button>
    <button class="action-btn" id="flock-btn"><i class="fas fa-dove"></i><span class="tip">Bầy chim</span></button>
    <button class="action-btn" id="rain-btn"><i class="fas fa-cloud-rain"></i><span class="tip">Mưa</span></button>
    <button class="action-btn" id="time-btn"><i class="fas fa-forward"></i><span class="tip">Chuyển thời gian</span></button>
    <button class="action-btn" id="speed-btn"><i class="fas fa-bolt"></i><span class="tip">Tốc độ</span></button>
  </div>

  <audio id="bgm" loop autoplay preload="auto">
    <source src="Arena%20of%20Valor%20-%20%E5%82%B3%E8%AA%AA%E5%B0%8D%E6%B1%BA%20_%20HERO%20MUSIC%20_%20Dolia%20_%20Original%20Sound%20Track%20%5BnZagrNVWnVo%5D.mp3" type="audio/mpeg">
  </audio>

  <script src="https://unpkg.com/@rive-app/canvas/rive.js"></script>
  <script>
    const bgm = document.getElementById('bgm');
    bgm.volume = 0.5;

    const playAudio = () => {
      bgm.play().then(() => {
        document.removeEventListener('click', playAudio);
        document.removeEventListener('touchstart', playAudio);
        document.removeEventListener('keydown', playAudio);
      }).catch(() => {});
    };
    playAudio();
    document.addEventListener('click', playAudio);
    document.addEventListener('touchstart', playAudio);
    document.addEventListener('keydown', playAudio);

    const skyCanvas = document.getElementById('sky-canvas');
    const skyCtx = skyCanvas.getContext('2d');
    const particleCanvas = document.getElementById('particle-canvas');
    const particleCtx = particleCanvas.getContext('2d');
    const trailCanvas = document.getElementById('trail-canvas');
    const trailCtx = trailCanvas.getContext('2d');
    const birdCanvas = document.getElementById('bird-canvas');
    const birdCtx = birdCanvas.getContext('2d');
    const riveCanvas = document.getElementById('rive-canvas');
    const clickCanvas = document.getElementById('click-canvas');
    const clickCtx = clickCanvas.getContext('2d');

    let vw = window.innerWidth;
    let vh = window.innerHeight;
    let time = 0;
    let bgColor = null;
    let speedMultiplier = 1;

    function resize() {
      skyCanvas.width = particleCanvas.width = trailCanvas.width = clickCanvas.width = window.innerWidth;
      skyCanvas.height = particleCanvas.height = trailCanvas.height = clickCanvas.height = window.innerHeight;
      vw = window.innerWidth;
      vh = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const SIZE = Math.min(400, Math.max(120, window.innerWidth * 0.25));
    birdCanvas.width = SIZE;
    birdCanvas.height = SIZE;
    riveCanvas.width = SIZE;
    riveCanvas.height = SIZE;
    birdCanvas.style.width = SIZE * 0.45 + 'px';
    birdCanvas.style.height = SIZE * 0.45 + 'px';

    new rive.Rive({
      src: 'birdfly.riv',
      canvas: riveCanvas,
      autoplay: true,
      stateMachines: 'State Machine 1',
      fit: rive.Fit.Contain,
      alignment: rive.Alignment.Center,
    });

    const stripCanvas = document.createElement('canvas');
    stripCanvas.width = SIZE;
    stripCanvas.height = SIZE;
    const stripCtx = stripCanvas.getContext('2d');

    function lerpColor(a, b, t) {
      return [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t,
        a[2] + (b[2] - a[2]) * t,
      ];
    }

    function drawSky(t) {
      const w = skyCanvas.width, h = skyCanvas.height;
      const cycle = t % 1;
      const isNight = cycle > 0.8 || cycle < 0.15;
      const isDawn = cycle > 0.12 && cycle < 0.25;
      const isDusk = cycle > 0.72 && cycle < 0.85;

      const topColors = [
        [5, 5, 30], [160, 100, 80], [70, 140, 230], [180, 80, 50], [5, 5, 30],
      ];
      const midHColors = [
        [15, 15, 50], [200, 140, 100], [140, 195, 255], [240, 140, 80], [15, 15, 50],
      ];
      const midLColors = [
        [20, 20, 60], [230, 180, 140], [180, 220, 255], [255, 170, 100], [20, 20, 60],
      ];
      const botColors = [
        [10, 10, 35], [255, 210, 170], [200, 235, 255], [255, 190, 130], [10, 10, 35],
      ];
      const groundColors = [
        [8, 10, 25], [180, 160, 130], [120, 180, 120], [180, 140, 100], [8, 10, 25],
      ];

      const seg = cycle * 4;
      const idx = Math.floor(seg);
      const frac = seg - idx;
      const mi = Math.min(idx + 1, 4);

      const cTop = lerpColor(topColors[idx], topColors[mi], frac);
      const cMidH = lerpColor(midHColors[idx], midHColors[mi], frac);
      const cMidL = lerpColor(midLColors[idx], midLColors[mi], frac);
      const cBot = lerpColor(botColors[idx], botColors[mi], frac);
      const cGround = lerpColor(groundColors[idx], groundColors[mi], frac);

      const grad = skyCtx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, 'rgb(' + cTop.map(Math.round).join(',') + ')');
      grad.addColorStop(0.25, 'rgb(' + cMidH.map(Math.round).join(',') + ')');
      grad.addColorStop(0.55, 'rgb(' + cMidL.map(Math.round).join(',') + ')');
      grad.addColorStop(0.8, 'rgb(' + cBot.map(Math.round).join(',') + ')');
      grad.addColorStop(1, 'rgb(' + cGround.map(Math.round).join(',') + ')');
      skyCtx.fillStyle = grad;
      skyCtx.fillRect(0, 0, w, h);

      // Sun with halo, rays, god rays
      const sunX = w * 0.3 + w * 0.4 * Math.cos(cycle * Math.PI * 2 - Math.PI / 2);
      const sunY = h * 0.7 - h * 0.5 * Math.sin(cycle * Math.PI * 2 - Math.PI / 2);

      if (cycle > 0.15 && cycle < 0.85) {
        const sunAlpha = Math.sin((cycle - 0.15) / 0.7 * Math.PI) * 0.9;
        // Outer glow
        const glowGrad = skyCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 200);
        glowGrad.addColorStop(0, 'rgba(255,255,200,' + (sunAlpha * 0.3) + ')');
        glowGrad.addColorStop(0.3, 'rgba(255,220,150,' + (sunAlpha * 0.15) + ')');
        glowGrad.addColorStop(0.6, 'rgba(255,200,100,' + (sunAlpha * 0.05) + ')');
        glowGrad.addColorStop(1, 'rgba(255,200,100,0)');
        skyCtx.fillStyle = glowGrad;
        skyCtx.beginPath();
        skyCtx.arc(sunX, sunY, 200, 0, Math.PI * 2);
        skyCtx.fill();
        // Sun body
        const sunGrad = skyCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 30);
        sunGrad.addColorStop(0, 'rgba(255,255,245,' + sunAlpha + ')');
        sunGrad.addColorStop(0.5, 'rgba(255,245,200,' + (sunAlpha * 0.85) + ')');
        sunGrad.addColorStop(1, 'rgba(255,210,120,' + (sunAlpha * 0.4) + ')');
        skyCtx.fillStyle = sunGrad;
        skyCtx.beginPath();
        skyCtx.arc(sunX, sunY, 30, 0, Math.PI * 2);
        skyCtx.fill();
        // Rays
        skyCtx.save();
        for (let i = 0; i < 36; i++) {
          const a = (i / 36) * Math.PI * 2 + t * 0.15;
          const len = 100 + Math.sin(i * 2.7 + t * 1.2) * 40;
          const a2 = sunAlpha * (0.03 + Math.sin(i * 4 + t * 0.8) * 0.02);
          skyCtx.globalAlpha = a2;
          skyCtx.beginPath();
          skyCtx.moveTo(sunX + Math.cos(a) * 32, sunY + Math.sin(a) * 32);
          skyCtx.lineTo(sunX + Math.cos(a - 0.02) * len, sunY + Math.sin(a - 0.02) * len);
          skyCtx.lineTo(sunX + Math.cos(a + 0.02) * len, sunY + Math.sin(a + 0.02) * len);
          skyCtx.closePath();
          skyCtx.fillStyle = 'rgba(255,255,200,0.5)';
          skyCtx.fill();
        }
        skyCtx.restore();
        // God rays through clouds
        skyCtx.save();
        skyCtx.globalAlpha = sunAlpha * 0.04;
        for (let i = 0; i < 8; i++) {
          const a = -0.6 + (i / 8) * 1.2;
          const rw = 30 + i * 10;
          skyCtx.beginPath();
          skyCtx.moveTo(sunX, sunY);
          skyCtx.lineTo(sunX + Math.cos(a) * w, sunY + Math.sin(a) * h * 0.7);
          skyCtx.lineTo(sunX + Math.cos(a + 0.08) * w, sunY + Math.sin(a + 0.08) * h * 0.7);
          skyCtx.closePath();
          skyCtx.fillStyle = 'rgba(255,255,220,0.3)';
          skyCtx.fill();
        }
        skyCtx.restore();
      }

      // Stars with twinkling + constellations
      if (isNight || isDawn || isDusk) {
        const starAlpha = isNight ? 1 : 0.4;
        for (let i = 0; i < 120; i++) {
          const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * w;
          const sy = (Math.sin(i * 311.7) * 0.5 + 0.5) * h * 0.55;
          const twinkle = Math.sin(t * 3 + i * 1.7) * 0.5 + 0.5;
          const sa = twinkle * starAlpha * 0.8;
          const size = 0.6 + twinkle * 1.0;
          skyCtx.fillStyle = 'rgba(255,255,230,' + sa + ')';
          skyCtx.beginPath();
          skyCtx.arc(sx, sy, size, 0, Math.PI * 2);
          skyCtx.fill();
          if (twinkle > 0.75 && starAlpha > 0.6) {
            skyCtx.fillStyle = 'rgba(255,255,230,' + (sa * 0.2) + ')';
            skyCtx.beginPath();
            skyCtx.arc(sx, sy, size * 4, 0, Math.PI * 2);
            skyCtx.fill();
          }
        }
        // Constellation lines
        if (isNight) {
          skyCtx.strokeStyle = 'rgba(200,210,240,0.08)';
          skyCtx.lineWidth = 0.5;
          const cons = [[0.1,0.08,0.15,0.12],[0.15,0.12,0.22,0.1],[0.22,0.1,0.28,0.15],[0.6,0.05,0.65,0.1],[0.65,0.1,0.72,0.08],[0.72,0.08,0.78,0.13]];
          cons.forEach(c => {
            skyCtx.beginPath();
            skyCtx.moveTo(c[0]*w, c[1]*h);
            skyCtx.lineTo(c[2]*w, c[3]*h);
            skyCtx.stroke();
          });
        }
      }

      // Shooting stars
      if (isNight && Math.sin(t * 0.7) > 0.95) {
        const ssX = w * 0.8 - (t * 50) % (w * 0.6);
        const ssY = h * 0.1 + (t * 50) % (w * 0.3) * 0.3;
        const ssAlpha = Math.sin((t * 0.7 - 0.95) / 0.05 * Math.PI);
        skyCtx.strokeStyle = 'rgba(255,255,255,' + (ssAlpha * 0.8) + ')';
        skyCtx.lineWidth = 1.5;
        skyCtx.beginPath();
        skyCtx.moveTo(ssX, ssY);
        skyCtx.lineTo(ssX - 60, ssY + 20);
        skyCtx.stroke();
        skyCtx.strokeStyle = 'rgba(255,255,200,' + (ssAlpha * 0.3) + ')';
        skyCtx.lineWidth = 4;
        skyCtx.beginPath();
        skyCtx.moveTo(ssX, ssY);
        skyCtx.lineTo(ssX - 30, ssY + 10);
        skyCtx.stroke();
      }

      // Aurora borealis at night
      if (isNight) {
        skyCtx.save();
        skyCtx.globalAlpha = 0.12 + Math.sin(t * 0.5) * 0.05;
        for (let i = 0; i < 5; i++) {
          const ay = h * 0.08 + i * h * 0.06;
          const ax = w * 0.2 + Math.sin(t * 0.3 + i) * w * 0.15;
          const aw = w * 0.4 + Math.sin(t * 0.2 + i * 2) * w * 0.1;
          const aGrad = skyCtx.createLinearGradient(ax, ay - 20, ax, ay + 20);
          const hue = 120 + Math.sin(t * 0.4 + i) * 40;
          aGrad.addColorStop(0, 'hsla(' + hue + ',80%,60%,0)');
          aGrad.addColorStop(0.5, 'hsla(' + hue + ',80%,60%,0.6)');
          aGrad.addColorStop(1, 'hsla(' + hue + ',80%,60%,0)');
          skyCtx.fillStyle = aGrad;
          skyCtx.beginPath();
          skyCtx.moveTo(ax, ay);
          skyCtx.bezierCurveTo(ax + aw * 0.3, ay - 30 + Math.sin(t + i) * 15, ax + aw * 0.7, ay + 25 + Math.cos(t + i) * 15, ax + aw, ay);
          skyCtx.lineTo(ax + aw, ay + 25);
          skyCtx.bezierCurveTo(ax + aw * 0.7, ay + 50 + Math.cos(t + i) * 10, ax + aw * 0.3, ay + 5 + Math.sin(t + i) * 10, ax, ay + 25);
          skyCtx.closePath();
          skyCtx.fill();
        }
        skyCtx.restore();
      }

      // Clouds with shading
      const clouds = [
        { x: 0.1, y: 0.08, s: 1.0, spd: 0.008 },
        { x: 0.35, y: 0.15, s: 1.3, spd: 0.005 },
        { x: 0.6, y: 0.06, s: 0.9, spd: 0.01 },
        { x: 0.85, y: 0.18, s: 1.1, spd: 0.007 },
        { x: 0.2, y: 0.25, s: 0.8, spd: 0.009 },
        { x: 0.5, y: 0.22, s: 1.2, spd: 0.006 },
        { x: 0.75, y: 0.1, s: 0.7, spd: 0.011 },
        { x: 0.95, y: 0.28, s: 1.0, spd: 0.008 },
        { x: 0.05, y: 0.32, s: 0.6, spd: 0.012 },
        { x: 0.45, y: 0.04, s: 0.5, spd: 0.013 },
      ];
      clouds.forEach(cl => {
        let cx = ((cl.x + t * cl.spd) % 1.3) - 0.15;
        cx *= w;
        const cy = cl.y * h;
        const s = cl.s;
        // Shadow
        if (!isNight) {
          skyCtx.fillStyle = 'rgba(180,190,210,0.15)';
          skyCtx.beginPath();
          skyCtx.ellipse(cx + 5, cy + 8, 62 * s, 18 * s, 0, 0, Math.PI * 2);
          skyCtx.fill();
        }
        const ca = isNight ? 0.1 : 0.55;
        const topC = isNight ? 'rgba(60,70,90,' + ca + ')' : 'rgba(255,255,255,' + ca + ')';
        const botC = isNight ? 'rgba(35,45,65,' + ca + ')' : 'rgba(230,235,245,' + (ca * 0.8) + ')';
        // Bottom shading
        const cGrad = skyCtx.createLinearGradient(cx, cy - 20 * s, cx, cy + 20 * s);
        cGrad.addColorStop(0, topC);
        cGrad.addColorStop(1, botC);
        skyCtx.fillStyle = cGrad;
        skyCtx.beginPath();
        skyCtx.ellipse(cx, cy, 60 * s, 22 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx - 30 * s, cy + 5 * s, 35 * s, 18 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx + 35 * s, cy + 3 * s, 40 * s, 20 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx + 5 * s, cy - 15 * s, 45 * s, 20 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx - 15 * s, cy - 10 * s, 30 * s, 16 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
      });

      // Distant birds
      if (!isNight) {
        const birdCount = 5;
        for (let i = 0; i < birdCount; i++) {
          const bx = ((0.15 + i * 0.15 + t * 0.01 + Math.sin(i * 3) * 0.05) % 1.2) * w;
          const by = h * 0.12 + Math.sin(t * 2 + i * 4) * 8 + i * 12;
          const bs = 3 + Math.sin(i * 2) * 1;
          const wingPhase = Math.sin(t * 8 + i * 2) * bs;
          skyCtx.strokeStyle = isNight ? 'rgba(30,40,60,0.4)' : 'rgba(40,40,50,0.35)';
          skyCtx.lineWidth = 1;
          skyCtx.beginPath();
          skyCtx.moveTo(bx - bs * 2, by + wingPhase);
          skyCtx.quadraticCurveTo(bx - bs, by - Math.abs(wingPhase) * 0.5, bx, by);
          skyCtx.quadraticCurveTo(bx + bs, by - Math.abs(wingPhase) * 0.5, bx + bs * 2, by + wingPhase);
          skyCtx.stroke();
        }
      }

      // Mountains - 4 layers with snow + shading
      const mBase = h * 0.68;

      const drawMountain = (baseY, amp1, amp2, freq1, freq2, color, snowColor, highlightColor) => {
        // Mountain body
        skyCtx.fillStyle = color;
        skyCtx.beginPath();
        skyCtx.moveTo(0, baseY + amp1);
        for (let x = 0; x <= w; x += 2) {
          const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2;
          skyCtx.lineTo(x, y);
        }
        skyCtx.lineTo(w, h); skyCtx.lineTo(0, h); skyCtx.fill();
        // Highlight on left side
        if (highlightColor && !isNight) {
          skyCtx.save();
          skyCtx.globalAlpha = 0.15;
          skyCtx.fillStyle = highlightColor;
          skyCtx.beginPath();
          for (let x = 0; x <= w; x += 2) {
            const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2;
            const y2 = y + Math.sin(x * 0.01) * 8;
            if (x === 0) skyCtx.moveTo(x, y);
            else skyCtx.lineTo(x, y2);
          }
          for (let x = w; x >= 0; x -= 4) {
            const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2 + 15;
            skyCtx.lineTo(x, y);
          }
          skyCtx.closePath();
          skyCtx.fill();
          skyCtx.restore();
        }
        // Snow caps
        if (snowColor) {
          skyCtx.save();
          skyCtx.globalAlpha = 0.65;
          skyCtx.fillStyle = snowColor;
          skyCtx.beginPath();
          for (let x = 0; x <= w; x += 2) {
            const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2;
            if (x === 0) skyCtx.moveTo(x, y);
            else skyCtx.lineTo(x, y);
          }
          for (let x = w; x >= 0; x -= 2) {
            const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2 + 10;
            skyCtx.lineTo(x, y);
          }
          skyCtx.closePath();
          skyCtx.fill();
          skyCtx.restore();
        }
      };

      drawMountain(mBase, 48, 22, 0.0015, 0.004,
        isNight ? 'rgba(15,20,35,0.75)' : 'rgba(90,120,110,0.45)',
        isNight ? 'rgba(200,210,230,0.15)' : 'rgba(255,255,255,0.35)',
        'rgba(255,255,255,1)');

      drawMountain(mBase + 42, 40, 18, 0.0025, 0.006,
        isNight ? 'rgba(18,28,42,0.8)' : 'rgba(65,105,75,0.5)',
        isNight ? 'rgba(180,200,220,0.1)' : 'rgba(255,255,255,0.25)',
        'rgba(255,255,255,0.8)');

      drawMountain(mBase + 78, 32, 15, 0.0035, 0.008,
        isNight ? 'rgba(22,35,50,0.85)' : 'rgba(50,90,60,0.55)', null, null);

      drawMountain(mBase + 105, 24, 12, 0.004, 0.01,
        isNight ? 'rgba(28,40,55,0.9)' : 'rgba(40,80,50,0.6)', null, null);

      // Moving fog layers
      for (let fl = 0; fl < 3; fl++) {
        const fogY = mBase + 50 + fl * 25;
        const fogOffset = Math.sin(t * 0.3 + fl * 2) * w * 0.05;
        const fogGrad = skyCtx.createLinearGradient(0, fogY, 0, fogY + 40);
        const fogA = isNight ? 0.05 + fl * 0.02 : 0.12 - fl * 0.02;
        fogGrad.addColorStop(0, 'rgba(200,220,240,0)');
        fogGrad.addColorStop(0.5, 'rgba(200,220,240,' + fogA + ')');
        fogGrad.addColorStop(1, 'rgba(200,220,240,0)');
        skyCtx.fillStyle = fogGrad;
        skyCtx.fillRect(fogOffset, fogY, w, 40);
      }

      // Trees - detailed with branches
      const treeBase = mBase + 115;
      for (let i = 0; i < 45; i++) {
        const tx = (i / 45) * w + Math.sin(i * 7.3) * 22;
        const th = 24 + Math.sin(i * 3.1) * 14;
        const tw = 10 + Math.sin(i * 5.7) * 5;
        const ty = treeBase + Math.sin(i * 2.3) * 8;
        const treeType = i % 3;

        // Trunk with texture
        skyCtx.fillStyle = isNight ? 'rgba(25,20,15,0.9)' : 'rgba(80,55,35,0.85)';
        skyCtx.fillRect(tx - 1.5, ty, 3, th * 0.45);
        // Trunk highlight
        if (!isNight) {
          skyCtx.fillStyle = 'rgba(120,90,55,0.3)';
          skyCtx.fillRect(tx - 0.5, ty, 1, th * 0.4);
        }

        if (treeType === 0) {
          // Round tree
          const colors = isNight
            ? [[18,35,20],[22,42,25],[15,30,18]]
            : [[40+Math.sin(i)*20, 110+Math.sin(i*2)*30, 55], [55+Math.sin(i)*15, 130+Math.sin(i*3)*20, 65], [35+Math.sin(i)*10, 95+Math.sin(i)*25, 50]];
          for (let j = 0; j < 3; j++) {
            const cy2 = ty - j * th * 0.22;
            const cr = tw * (1 - j * 0.15);
            skyCtx.fillStyle = 'rgba(' + colors[j].map(Math.round).join(',') + ',0.88)';
            skyCtx.beginPath();
            skyCtx.ellipse(tx, cy2, cr, cr * 0.8, 0, 0, Math.PI * 2);
            skyCtx.fill();
          }
        } else if (treeType === 1) {
          // Pine tree
          for (let j = 0; j < 4; j++) {
            const cy2 = ty - j * th * 0.18;
            const cw = tw * (1.2 - j * 0.2);
            const g = isNight ? [15+ j*3, 35+j*5, 20] : [35+j*12, 100+j*15, 45+j*8];
            skyCtx.fillStyle = 'rgba(' + g.map(Math.round).join(',') + ',0.85)';
            skyCtx.beginPath();
            skyCtx.moveTo(tx, cy2 - th * 0.2);
            skyCtx.lineTo(tx - cw, cy2 + 4);
            skyCtx.lineTo(tx + cw, cy2 + 4);
            skyCtx.closePath();
            skyCtx.fill();
          }
        } else {
          // Bush
          const g = isNight ? [20, 38, 22] : [50+Math.sin(i)*15, 120+Math.sin(i*2)*25, 60];
          skyCtx.fillStyle = 'rgba(' + g.map(Math.round).join(',') + ',0.85)';
          skyCtx.beginPath();
          skyCtx.ellipse(tx, ty - th * 0.15, tw * 1.3, th * 0.3, 0, 0, Math.PI * 2);
          skyCtx.fill();
          skyCtx.beginPath();
          skyCtx.ellipse(tx - tw * 0.5, ty - th * 0.1, tw * 0.7, th * 0.2, 0, 0, Math.PI * 2);
          skyCtx.fill();
          skyCtx.beginPath();
          skyCtx.ellipse(tx + tw * 0.5, ty - th * 0.1, tw * 0.7, th * 0.2, 0, 0, Math.PI * 2);
          skyCtx.fill();
        }
      }

      // Grass field
      const grassY = mBase + 130;
      const grassGrad = skyCtx.createLinearGradient(0, grassY, 0, grassY + 35);
      if (isNight) {
        grassGrad.addColorStop(0, 'rgba(15,30,18,0.7)');
        grassGrad.addColorStop(1, 'rgba(10,20,12,0.85)');
      } else {
        grassGrad.addColorStop(0, 'rgba(65,140,65,0.5)');
        grassGrad.addColorStop(1, 'rgba(45,100,45,0.65)');
      }
      skyCtx.fillStyle = grassGrad;
      skyCtx.fillRect(0, grassY, w, 35);

      // Grass blades with wind
      for (let i = 0; i < 120; i++) {
        const gx = (i / 120) * w + Math.sin(i * 5) * 6;
        const gy = grassY + Math.sin(i * 3) * 3;
        const gh = 5 + Math.sin(i * 2) * 5;
        const sway = Math.sin(t * 2.5 + i * 0.4) * 4;
        const brightness = isNight ? 30 : 80 + Math.sin(i * 1.5) * 40;
        skyCtx.strokeStyle = 'rgba(' + Math.round(brightness * 0.5) + ',' + Math.round(brightness) + ',' + Math.round(brightness * 0.4) + ',0.45)';
        skyCtx.lineWidth = 0.8;
        skyCtx.beginPath();
        skyCtx.moveTo(gx, gy);
        skyCtx.quadraticCurveTo(gx + sway, gy - gh * 0.5, gx + sway * 1.5, gy - gh);
        skyCtx.stroke();
      }

      // Flowers with variety
      if (!isNight) {
        for (let i = 0; i < 25; i++) {
          const fx = (i / 25) * w + Math.sin(i * 11) * 35;
          const fy = grassY + 3 + Math.sin(i * 4) * 6;
          const fcolors = [
            [255,180,180],[255,255,180],[200,180,255],[255,200,220],
            [180,220,255],[255,220,200],[200,255,200],[255,200,255]
          ];
          const fc = fcolors[i % 8];
          const fs = 1.5 + Math.sin(i * 3) * 0.5;
          skyCtx.fillStyle = 'rgba(' + fc[0] + ',' + fc[1] + ',' + fc[2] + ',0.75)';
          for (let p = 0; p < 5; p++) {
            const pa = (p / 5) * Math.PI * 2 + Math.sin(t + i) * 0.1;
            skyCtx.beginPath();
            skyCtx.ellipse(fx + Math.cos(pa) * fs * 1.5, fy + Math.sin(pa) * fs * 1.5, fs, fs * 0.6, pa, 0, Math.PI * 2);
            skyCtx.fill();
          }
          skyCtx.fillStyle = 'rgba(255,255,100,0.85)';
          skyCtx.beginPath();
          skyCtx.arc(fx, fy, fs * 0.6, 0, Math.PI * 2);
          skyCtx.fill();
        }
      }

      // Water with sky reflection
      const waterY = h - 35;
      // Reflected sky gradient
      const waterGrad = skyCtx.createLinearGradient(0, waterY, 0, h);
      if (isNight) {
        waterGrad.addColorStop(0, 'rgba(8,12,25,0.7)');
        waterGrad.addColorStop(1, 'rgba(5,8,18,0.85)');
      } else {
        const wr = Math.round(cBot[0] * 0.35 + 50);
        const wg = Math.round(cBot[1] * 0.35 + 80);
        const wb = Math.round(cBot[2] * 0.35 + 100);
        waterGrad.addColorStop(0, 'rgba(' + wr + ',' + wg + ',' + wb + ',0.45)');
        waterGrad.addColorStop(1, 'rgba(' + Math.round(wr * 0.6) + ',' + Math.round(wg * 0.6) + ',' + Math.round(wb * 0.6) + ',0.65)');
      }
      skyCtx.fillStyle = waterGrad;
      skyCtx.fillRect(0, waterY, w, 35);

      // Sun reflection on water
      if (!isNight && cycle > 0.15 && cycle < 0.85) {
        const reflX = sunX;
        const reflY = waterY + 5;
        skyCtx.save();
        skyCtx.globalAlpha = 0.15;
        for (let i = 0; i < 8; i++) {
          const rx = reflX + Math.sin(t * 3 + i * 0.8) * (5 + i * 3);
          const ry = reflY + i * 3;
          const rw = 3 + i * 2;
          skyCtx.fillStyle = 'rgba(255,255,200,0.3)';
          skyCtx.beginPath();
          skyCtx.ellipse(rx, ry, rw, 1, 0, 0, Math.PI * 2);
          skyCtx.fill();
        }
        skyCtx.restore();
      }

      // Water ripples
      for (let i = 0; i < 8; i++) {
        const ry2 = waterY + 2 + i * 4;
        const alpha = isNight ? 0.05 : 0.1 - i * 0.01;
        skyCtx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        skyCtx.lineWidth = 0.7;
        skyCtx.beginPath();
        for (let x = 0; x <= w; x += 3) {
          const y2 = ry2 + Math.sin(x * 0.015 + t * 1.5 + i * 1.1) * 1.5 + Math.sin(x * 0.008 + t * 0.7) * 0.8;
          x === 0 ? skyCtx.moveTo(x, y2) : skyCtx.lineTo(x, y2);
        }
        skyCtx.stroke();
      }

      // Moon with craters
      if (isNight) {
        const moonX = w * 0.78;
        const moonY = h * 0.12;
        const moonGlow = skyCtx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
        moonGlow.addColorStop(0, 'rgba(220,230,255,0.2)');
        moonGlow.addColorStop(0.3, 'rgba(200,210,240,0.08)');
        moonGlow.addColorStop(1, 'rgba(200,210,240,0)');
        skyCtx.fillStyle = moonGlow;
        skyCtx.beginPath();
        skyCtx.arc(moonX, moonY, 80, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.fillStyle = 'rgba(235,240,255,0.9)';
        skyCtx.beginPath();
        skyCtx.arc(moonX, moonY, 20, 0, Math.PI * 2);
        skyCtx.fill();
        // Craters
        skyCtx.fillStyle = 'rgba(210,215,230,0.6)';
        skyCtx.beginPath(); skyCtx.arc(moonX - 5, moonY - 4, 4, 0, Math.PI * 2); skyCtx.fill();
        skyCtx.beginPath(); skyCtx.arc(moonX + 6, moonY + 3, 3, 0, Math.PI * 2); skyCtx.fill();
        skyCtx.beginPath(); skyCtx.arc(moonX - 2, moonY + 6, 2.5, 0, Math.PI * 2); skyCtx.fill();
        // Moon shadow (crescent effect)
        skyCtx.fillStyle = 'rgba(15,20,35,0.7)';
        skyCtx.beginPath();
        skyCtx.arc(moonX + 6, moonY - 2, 17, 0, Math.PI * 2);
        skyCtx.fill();
      }

      // Fireflies
      if (isNight) {
        for (let i = 0; i < 25; i++) {
          const fx = (Math.sin(i * 83.7 + t * 0.3) * 0.5 + 0.5) * w;
          const fy = (Math.sin(i * 191.3 + t * 0.2) * 0.5 + 0.5) * h * 0.45 + h * 0.35;
          const fa = (Math.sin(t * 4 + i * 2.1) * 0.5 + 0.5) * 0.7;
          skyCtx.fillStyle = 'rgba(255,255,150,' + fa + ')';
          skyCtx.beginPath();
          skyCtx.arc(fx, fy, 1.8, 0, Math.PI * 2);
          skyCtx.fill();
          skyCtx.fillStyle = 'rgba(255,255,150,' + (fa * 0.15) + ')';
          skyCtx.beginPath();
          skyCtx.arc(fx, fy, 8, 0, Math.PI * 2);
          skyCtx.fill();
        }
      }

      // Floating dust/pollen in sunlight
      if (!isNight) {
        skyCtx.save();
        for (let i = 0; i < 30; i++) {
          const dx = (Math.sin(i * 67.3 + t * 0.15) * 0.5 + 0.5) * w;
          const dy = (Math.sin(i * 143.7 + t * 0.1) * 0.5 + 0.5) * h * 0.6 + h * 0.1;
          const da = (Math.sin(t * 2 + i * 1.3) * 0.5 + 0.5) * 0.35;
          const ds = 1 + Math.sin(i * 2.7) * 0.5;
          skyCtx.globalAlpha = da;
          skyCtx.fillStyle = 'rgba(255,255,220,0.8)';
          skyCtx.beginPath();
          skyCtx.arc(dx, dy, ds, 0, Math.PI * 2);
          skyCtx.fill();
        }
        skyCtx.restore();
      }
    }

    const birdParticles = [];
    const floatingParticles = [];
    const birdBurstParticles = [];

    let skyTime = 0;
    let birdTime = 0;
    let birdSpin = 0;
    let birdBounce = 0;
    let mouseX = -1000, mouseY = -1000;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
    });
    document.addEventListener('click', (e) => {
      const cx2 = vw / 2, cy2 = vh / 2;
      const rx2 = vw * 0.35, ry2 = vh * 0.25;
      const bx = cx2 + Math.cos(birdTime) * rx2;
      const by = cy2 + Math.sin(birdTime * 2) * ry2;
      const dist = Math.hypot(e.clientX - bx, e.clientY - by);
      if (dist < 80) {
        birdSpin = Math.PI * 2;
        birdBounce = 15;
        for (let i = 0; i < 25; i++) {
          const angle = (i / 25) * Math.PI * 2;
          const speed = 1.5 + Math.random() * 3;
          const colors = ['255,220,100','255,180,180','180,255,200','255,255,180'];
          birdBurstParticles.push({
            x: bx, y: by,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 3, alpha: 1, life: 1,
            color: colors[Math.floor(Math.random() * colors.length)],
          });
        }
      }
    });

    function loop() {
      skyTime += 0.001 * speedMultiplier;
      birdTime += 0.005 * speedMultiplier;
      drawSky(skyTime);
      drawRain();
      drawFlock();

      const cx = vw / 2, cy = vh / 2;
      const rx = vw * 0.35, ry = vh * 0.25;
      let birdX = cx + Math.cos(birdTime) * rx;
      let birdY = cy + Math.sin(birdTime * 2) * ry;

      // Mouse hover near bird → speed boost + sparkle
      const distToMouse = Math.hypot(mouseX - birdX, mouseY - birdY);
      if (distToMouse < 120) {
        birdTime += 0.003;
        if (Math.random() < 0.4) {
          birdBurstParticles.push({
            x: birdX + (Math.random() - 0.5) * 40,
            y: birdY + (Math.random() - 0.5) * 40,
            vx: (Math.random() - 0.5) * 2, vy: -(Math.random() * 2 + 0.5),
            size: 1.5 + Math.random() * 2, alpha: 0.8, life: 1,
            color: '255,255,200',
          });
        }
      }

      // Bird bounce
      if (birdBounce > 0) {
        birdY -= birdBounce * Math.sin(birdBounce * 0.5);
        birdBounce *= 0.85;
        if (birdBounce < 0.5) birdBounce = 0;
      }

      const goingRight = Math.sin(birdTime) < 0;
      const goingUp = Math.cos(birdTime * 2) < 0;
      const tilt = goingUp ? -10 : 10;
      const scaleX = goingRight ? 1 : -1;

      // Bird spin
      let spinDeg = 0;
      if (birdSpin > 0) {
        spinDeg = (birdSpin / (Math.PI * 2)) * 360;
        birdSpin -= 0.08;
        if (birdSpin < 0) birdSpin = 0;
      }

      birdCanvas.style.left = (birdX - SIZE / 2) + 'px';
      birdCanvas.style.top = (birdY - SIZE / 2) + 'px';
      birdCanvas.style.transform = 'scaleX(' + scaleX + ') rotate(' + ((goingRight ? tilt : -tilt) + spinDeg) + 'deg)';

      stripCtx.clearRect(0, 0, SIZE, SIZE);
      stripCtx.drawImage(riveCanvas, 0, 0, SIZE, SIZE);
      const img = stripCtx.getImageData(0, 0, SIZE, SIZE);
      const d = img.data;

      if (!bgColor) {
        for (let i = 0; i < d.length; i += 4) {
          if (d[i+3] > 10) { bgColor = [d[i], d[i+1], d[i+2]]; break; }
        }
      }
      if (bgColor) {
        const [br, bg, bb] = bgColor;
        for (let i = 0; i < d.length; i += 4) {
          if (d[i+3] > 0 && Math.abs(d[i]-br) < 25 && Math.abs(d[i+1]-bg) < 25 && Math.abs(d[i+2]-bb) < 25) {
            d[i+3] = 0;
          }
        }
      }

      birdCtx.clearRect(0, 0, SIZE, SIZE);
      birdCtx.putImageData(img, 0, 0);

      if (Math.random() < 0.3) {
        birdParticles.push({
          x: birdX + (Math.random() - 0.5) * 30,
          y: birdY + (Math.random() - 0.5) * 30,
          size: Math.random() * 4 + 2,
          alpha: 0.5,
          life: 1,
        });
        if (birdParticles.length > 20) birdParticles.shift();
      }

      trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
      for (let i = birdParticles.length - 1; i >= 0; i--) {
        const p = birdParticles[i];
        p.life -= 0.015; p.alpha = p.life * 0.35; p.size *= 0.99; p.y -= 0.2;
        if (p.life <= 0) { birdParticles.splice(i, 1); continue; }
        trailCtx.beginPath();
        trailCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        trailCtx.fillStyle = 'rgba(255,220,120,' + p.alpha + ')';
        trailCtx.fill();
      }

      // Bird burst particles
      for (let i = birdBurstParticles.length - 1; i >= 0; i--) {
        const p = birdBurstParticles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.05; p.vx *= 0.97; p.vy *= 0.97;
        p.life -= 0.025; p.alpha = p.life * 0.8;
        p.size *= 0.97;
        if (p.life <= 0) { birdBurstParticles.splice(i, 1); continue; }
        trailCtx.globalAlpha = p.alpha;
        trailCtx.fillStyle = 'rgb(' + p.color + ')';
        trailCtx.beginPath();
        trailCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        trailCtx.fill();
        trailCtx.globalAlpha = p.alpha * 0.3;
        trailCtx.beginPath();
        trailCtx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
        trailCtx.fill();
      }
      trailCtx.globalAlpha = 1;

      if (Math.random() < 0.08) {
        floatingParticles.push({
          x: Math.random() * vw, y: vh + 10,
          size: Math.random() * 3 + 1, alpha: Math.random() * 0.3 + 0.1,
          vx: (Math.random() - 0.5) * 0.3, vy: -(Math.random() * 0.4 + 0.2), life: 1,
        });
        if (floatingParticles.length > 50) floatingParticles.shift();
      }

      particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      for (let i = floatingParticles.length - 1; i >= 0; i--) {
        const p = floatingParticles[i];
        p.x += p.vx + Math.sin(skyTime * 3 + i) * 0.15;
        p.y += p.vy; p.life -= 0.003; p.alpha = p.life * 0.3;
        if (p.life <= 0 || p.y < -10) { floatingParticles.splice(i, 1); continue; }
        particleCtx.beginPath();
        particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        particleCtx.fillStyle = 'rgba(255,255,255,' + p.alpha + ')';
        particleCtx.fill();
      }

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // Spin button
    document.getElementById('spin-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      birdSpin = Math.PI * 4;
      birdBounce = 20;
      const cx2 = vw / 2, cy2 = vh / 2;
      const bx = cx2 + Math.cos(birdTime) * vw * 0.35;
      const by = cy2 + Math.sin(birdTime * 2) * vh * 0.25;
      for (let i = 0; i < 30; i++) {
        const angle = (i / 30) * Math.PI * 2;
        const speed = 2 + Math.random() * 3;
        birdBurstParticles.push({
          x: bx, y: by,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 3, alpha: 1, life: 1,
          color: '255,220,100',
        });
      }
    });

    // Fireworks button
    document.getElementById('burst-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      for (let b = 0; b < 3; b++) {
        setTimeout(() => {
          const fx = vw * 0.2 + Math.random() * vw * 0.6;
          const fy = vh * 0.15 + Math.random() * vh * 0.35;
          const colors = ['255,100,100','100,255,100','100,100,255','255,255,100','255,100,255','100,255,255'];
          const c = colors[Math.floor(Math.random() * colors.length)];
          for (let i = 0; i < 35; i++) {
            const angle = (i / 35) * Math.PI * 2;
            const speed = 1 + Math.random() * 4;
            clickParticles.push({
              x: fx, y: fy,
              vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
              size: 2 + Math.random() * 3, alpha: 1, life: 1,
              color: c,
            });
          }
        }, b * 400);
      }
    });

    // Flock button - clones of main bird
    let flockActive = false;
    let flockBirds = [];
    const flockCanvas = document.createElement('canvas');
    const flockCtx = flockCanvas.getContext('2d');
    document.getElementById('flock-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const btn = document.getElementById('flock-btn');
      flockActive = !flockActive;
      btn.classList.toggle('active', flockActive);
      if (!flockActive) {
        flockBirds = [];
      } else {
        const cx2 = vw / 2, cy2 = vh / 2;
        const bx = cx2 + Math.cos(birdTime) * vw * 0.35;
        const by = cy2 + Math.sin(birdTime * 2) * vh * 0.25;
        for (let i = 0; i < 10; i++) {
          const angle = (i / 10) * Math.PI * 2;
          const spread = 120 + Math.random() * 80;
          flockBirds.push({
            x: bx + Math.cos(angle) * spread,
            y: by + Math.sin(angle) * spread,
            vx: Math.cos(angle) * 2 + (Math.random() - 0.5) * 2,
            vy: Math.sin(angle) * 2 + (Math.random() - 0.5) * 2,
            scale: 0.3 + Math.random() * 0.5,
            tilt: 0,
          });
        }
      }
    });

    // Rain button
    let rainActive = false;
    let rainDrops = [];
    document.getElementById('rain-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const btn = document.getElementById('rain-btn');
      rainActive = !rainActive;
      btn.classList.toggle('active', rainActive);
      if (!rainActive) rainDrops = [];
    });

    // Time jump button
    document.getElementById('time-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      skyTime += 0.25;
    });

    // Speed button
    const speeds = [
      { val: 0.3, label: 'Cham' },
      { val: 0.7, label: 'Vua' },
      { val: 1, label: 'BinhThuong' },
      { val: 1.5, label: 'Nhanh' },
      { val: 2.5, label: 'RatNhanh' },
    ];
    let speedIdx = 2;
    speedMultiplier = speeds[speedIdx].val;
    document.getElementById('speed-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      speedIdx = (speedIdx + 1) % speeds.length;
      speedMultiplier = speeds[speedIdx].val;
    });

    function drawFlock() {
      if (!flockActive || flockBirds.length === 0) return;
      const cx2 = vw / 2, cy2 = vh / 2;
      const rx2 = vw * 0.35, ry2 = vh * 0.25;
      const bx = cx2 + Math.cos(birdTime) * rx2;
      const by = cy2 + Math.sin(birdTime * 2) * ry2;
      const leaderVx = -Math.sin(birdTime) * rx2 * 0.005;
      const leaderVy = Math.cos(birdTime * 2) * ry2 * 0.01;
      const leaderTilt = Math.atan2(leaderVy, Math.abs(leaderVx)) * 30;
      const leaderDir = leaderVx > 0 ? 1 : -1;

      flockBirds.forEach((b, i) => {
        // Target position: offset behind leader
        const offsetAngle = birdTime - (i + 1) * 0.12;
        const spreadX = 60 + i * 25;
        const spreadY = (Math.sin(i * 2.5) * 50) + (i % 2 === 0 ? -40 : 40);
        const tx = bx - leaderDir * spreadX + Math.sin(offsetAngle * 2) * spreadY;
        const ty = by + Math.cos(offsetAngle * 3) * spreadY * 0.6;

        // Smooth follow
        b.vx += (tx - b.x) * 0.02 * speedMultiplier;
        b.vy += (ty - b.y) * 0.02 * speedMultiplier;

        // Separation
        flockBirds.forEach((other, j) => {
          if (i === j) return;
          const sx = b.x - other.x, sy = b.y - other.y;
          const sd = Math.hypot(sx, sy) || 1;
          if (sd < 80) {
            const force = (80 - sd) / 80 * 0.5;
            b.vx += (sx / sd) * force;
            b.vy += (sy / sd) * force;
          }
        });

        b.vx *= 0.92; b.vy *= 0.92;
        b.x += b.vx; b.y += b.vy;

        if (b.x < -80) b.x = vw + 80;
        if (b.x > vw + 80) b.x = -80;
        if (b.y < -80) b.y = vh + 80;
        if (b.y > vh + 80) b.y = -80;

        skyCtx.save();
        skyCtx.translate(b.x, b.y);
        skyCtx.scale(leaderDir * b.scale, b.scale);
        skyCtx.rotate(leaderTilt * Math.PI / 180);
        skyCtx.drawImage(birdCanvas, -SIZE / 2, -SIZE / 2, SIZE, SIZE);
        skyCtx.restore();
      });
    }

    function drawRain() {
      if (!rainActive) return;
      for (let i = 0; i < 3; i++) {
        rainDrops.push({
          x: Math.random() * vw, y: -10,
          speed: 8 + Math.random() * 6,
          length: 15 + Math.random() * 10,
          alpha: 0.15 + Math.random() * 0.15,
        });
      }
      if (rainDrops.length > 200) rainDrops.splice(0, rainDrops.length - 200);
      skyCtx.strokeStyle = 'rgba(180,200,255,0.3)';
      skyCtx.lineWidth = 1;
      for (let i = rainDrops.length - 1; i >= 0; i--) {
        const d = rainDrops[i];
        d.y += d.speed;
        d.x -= 1;
        if (d.y > vh) { rainDrops.splice(i, 1); continue; }
        skyCtx.globalAlpha = d.alpha;
        skyCtx.beginPath();
        skyCtx.moveTo(d.x, d.y);
        skyCtx.lineTo(d.x + 1, d.y + d.length);
        skyCtx.stroke();
      }
      skyCtx.globalAlpha = 1;
    }

    const clickParticles = [];
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 15; i++) {
        const angle = (i / 15) * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        const colors = ['255,220,100','255,180,180','180,220,255','255,255,180','200,255,200'];
        clickParticles.push({
          x: e.clientX, y: e.clientY,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 3, alpha: 1, life: 1,
          color: colors[Math.floor(Math.random() * colors.length)],
        });
      }
      if (clickParticles.length > 100) clickParticles.splice(0, clickParticles.length - 100);
    });

    document.addEventListener('mousemove', (e) => {
      if (Math.random() > 0.6) return;
      clickParticles.push({
        x: e.clientX, y: e.clientY,
        vx: (Math.random() - 0.5) * 1.5, vy: -(Math.random() * 1.5 + 0.5),
        size: 1.5 + Math.random() * 2, alpha: 0.7, life: 1,
        color: '255,255,200',
      });
      if (clickParticles.length > 100) clickParticles.splice(0, clickParticles.length - 100);
    });

    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
      for (let i = 0; i < 40; i++) {
        const angle = (i / 40) * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        const colors = ['255,220,100','255,150,200','200,255,255','255,255,200'];
        clickParticles.push({
          x: e.clientX, y: e.clientY,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: 3 + Math.random() * 4, alpha: 1, life: 1,
          color: colors[Math.floor(Math.random() * colors.length)],
        });
      }
    });

    function animateClickParticles() {
      clickCanvas.width = vw;
      clickCanvas.height = vh;
      clickCtx.clearRect(0, 0, vw, vh);
      for (let i = clickParticles.length - 1; i >= 0; i--) {
        const p = clickParticles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.03;
        p.vx *= 0.98; p.vy *= 0.98;
        p.life -= 0.02; p.alpha = p.life * 0.8;
        p.size *= 0.98;
        if (p.life <= 0) { clickParticles.splice(i, 1); continue; }
        clickCtx.globalAlpha = p.alpha;
        clickCtx.fillStyle = 'rgb(' + p.color + ')';
        clickCtx.beginPath();
        clickCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        clickCtx.fill();
        clickCtx.globalAlpha = p.alpha * 0.3;
        clickCtx.beginPath();
        clickCtx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
        clickCtx.fill();
      }
      clickCtx.globalAlpha = 1;
      requestAnimationFrame(animateClickParticles);
    }
    animateClickParticles();
  </script>
</body>
</html>
