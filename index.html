<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird Fly - Relax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Quicksand', sans-serif;
    }

    #sky-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .clouds {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 4px 30px rgba(255,255,255,0.5);
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud-1 { width: 160px; height: 55px; top: 3%; left: 5%; animation: drift1 55s linear infinite; }
    .cloud-1::before { width: 80px; height: 70px; top: -35px; left: 30px; }
    .cloud-1::after { width: 100px; height: 55px; top: -22px; left: 70px; }

    .cloud-2 { width: 200px; height: 70px; top: 8%; left: 30%; animation: drift2 70s linear infinite 10s; }
    .cloud-2::before { width: 100px; height: 80px; top: -40px; left: 40px; }
    .cloud-2::after { width: 120px; height: 70px; top: -30px; left: 90px; }

    .cloud-3 { width: 120px; height: 42px; top: 18%; left: 65%; animation: drift3 60s linear infinite 5s; }
    .cloud-3::before { width: 60px; height: 55px; top: -28px; left: 20px; }
    .cloud-3::after { width: 80px; height: 42px; top: -18px; left: 50px; }

    .cloud-4 { width: 180px; height: 60px; top: 12%; left: 85%; animation: drift1 80s linear infinite 18s; }
    .cloud-4::before { width: 90px; height: 72px; top: -36px; left: 35px; }
    .cloud-4::after { width: 110px; height: 60px; top: -25px; left: 80px; }

    .cloud-5 { width: 100px; height: 38px; top: 28%; left: 15%; animation: drift2 65s linear infinite 25s; }
    .cloud-5::before { width: 50px; height: 48px; top: -24px; left: 15px; }
    .cloud-5::after { width: 65px; height: 38px; top: -14px; left: 40px; }

    .cloud-6 { width: 150px; height: 52px; top: 22%; left: 50%; animation: drift3 75s linear infinite 15s; }
    .cloud-6::before { width: 75px; height: 62px; top: -31px; left: 28px; }
    .cloud-6::after { width: 95px; height: 52px; top: -20px; left: 65px; }

    .cloud-7 { width: 130px; height: 45px; top: 35%; left: 75%; animation: drift1 90s linear infinite 35s; }
    .cloud-7::before { width: 65px; height: 55px; top: -27px; left: 22px; }
    .cloud-7::after { width: 82px; height: 45px; top: -16px; left: 48px; }

    .cloud-8 { width: 90px; height: 34px; top: 40%; left: 40%; animation: drift2 58s linear infinite 45s; }
    .cloud-8::before { width: 45px; height: 42px; top: -21px; left: 12px; }
    .cloud-8::after { width: 58px; height: 34px; top: -12px; left: 35px; }

    @keyframes drift1 { from { transform: translateX(0); } to { transform: translateX(110vw); } }
    @keyframes drift2 { from { transform: translateX(0); } to { transform: translateX(-110vw); } }
    @keyframes drift3 { from { transform: translateX(0); } to { transform: translateX(110vw); } }

    #trail-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    #bird-canvas {
      position: fixed;
      width: 180px;
      height: 180px;
      z-index: 4;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.15));
    }

    #rive-canvas {
      position: fixed;
      width: 180px;
      height: 180px;
      opacity: 0;
      pointer-events: none;
    }

    .speed-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 20;
    }
    .speed-btn:hover {
      background: rgba(255,255,255,0.28);
      transform: scale(1.08);
    }
    .speed-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <canvas id="sky-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>

  <div class="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="cloud cloud-5"></div>
    <div class="cloud cloud-6"></div>
    <div class="cloud cloud-7"></div>
    <div class="cloud cloud-8"></div>
  </div>

  <canvas id="trail-canvas"></canvas>
  <canvas id="bird-canvas"></canvas>
  <canvas id="rive-canvas"></canvas>

  <button class="speed-btn" id="speed-btn" title="Change speed">1x</button>

  <audio id="bgm" loop autoplay preload="auto">
    <source src="Arena%20of%20Valor%20-%20%E5%82%B3%E8%AA%AA%E5%B0%8D%E6%B1%BA%20_%20HERO%20MUSIC%20_%20Dolia%20_%20Original%20Sound%20Track%20%5BnZagrNVWnVo%5D.mp3" type="audio/mpeg">
  </audio>

  <script src="https://unpkg.com/@rive-app/canvas/rive.js"></script>
  <script>
    const bgm = document.getElementById('bgm');
    bgm.volume = 0.5;

    bgm.play().catch(() => {
      const tryPlay = () => {
        bgm.play().catch(() => {});
        document.removeEventListener('click', tryPlay);
        document.removeEventListener('touchstart', tryPlay);
      };
      document.addEventListener('click', tryPlay);
      document.addEventListener('touchstart', tryPlay);
    });

    const skyCanvas = document.getElementById('sky-canvas');
    const skyCtx = skyCanvas.getContext('2d');
    const particleCanvas = document.getElementById('particle-canvas');
    const particleCtx = particleCanvas.getContext('2d');
    const trailCanvas = document.getElementById('trail-canvas');
    const trailCtx = trailCanvas.getContext('2d');
    const birdCanvas = document.getElementById('bird-canvas');
    const birdCtx = birdCanvas.getContext('2d');
    const riveCanvas = document.getElementById('rive-canvas');

    function resize() {
      skyCanvas.width = particleCanvas.width = trailCanvas.width = window.innerWidth;
      skyCanvas.height = particleCanvas.height = trailCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const SIZE = 400;
    birdCanvas.width = SIZE;
    birdCanvas.height = SIZE;
    riveCanvas.width = SIZE;
    riveCanvas.height = SIZE;

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let time = 0;
    let bgColor = null;
    let speedMultiplier = 1;

    new rive.Rive({
      src: 'birdfly.riv',
      canvas: riveCanvas,
      autoplay: true,
      stateMachines: 'State Machine 1',
      fit: rive.Fit.Contain,
      alignment: rive.Alignment.Center,
    });

    const stripCanvas = document.createElement('canvas');
    stripCanvas.width = SIZE;
    stripCanvas.height = SIZE;
    const stripCtx = stripCanvas.getContext('2d');

    function lerpColor(a, b, t) {
      return [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t,
        a[2] + (b[2] - a[2]) * t,
      ];
    }

    function drawSky(t) {
      const w = skyCanvas.width, h = skyCanvas.height;
      const cycle = t % 1;
      const isNight = cycle > 0.8 || cycle < 0.15;
      const isDawn = cycle > 0.12 && cycle < 0.25;
      const isDusk = cycle > 0.72 && cycle < 0.85;

      // 5-stop gradient sky
      const topColors = [
        [5, 5, 30], [160, 100, 80], [70, 140, 230], [180, 80, 50], [5, 5, 30],
      ];
      const midHColors = [
        [15, 15, 50], [200, 140, 100], [140, 195, 255], [240, 140, 80], [15, 15, 50],
      ];
      const midLColors = [
        [20, 20, 60], [230, 180, 140], [180, 220, 255], [255, 170, 100], [20, 20, 60],
      ];
      const botColors = [
        [10, 10, 35], [255, 210, 170], [200, 235, 255], [255, 190, 130], [10, 10, 35],
      ];
      const groundColors = [
        [8, 10, 25], [180, 160, 130], [120, 180, 120], [180, 140, 100], [8, 10, 25],
      ];

      const seg = cycle * 4;
      const idx = Math.floor(seg);
      const frac = seg - idx;
      const mi = Math.min(idx + 1, 4);

      const cTop = lerpColor(topColors[idx], topColors[mi], frac);
      const cMidH = lerpColor(midHColors[idx], midHColors[mi], frac);
      const cMidL = lerpColor(midLColors[idx], midLColors[mi], frac);
      const cBot = lerpColor(botColors[idx], botColors[mi], frac);
      const cGround = lerpColor(groundColors[idx], groundColors[mi], frac);

      const grad = skyCtx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, 'rgb(' + cTop.map(Math.round).join(',') + ')');
      grad.addColorStop(0.25, 'rgb(' + cMidH.map(Math.round).join(',') + ')');
      grad.addColorStop(0.55, 'rgb(' + cMidL.map(Math.round).join(',') + ')');
      grad.addColorStop(0.8, 'rgb(' + cBot.map(Math.round).join(',') + ')');
      grad.addColorStop(1, 'rgb(' + cGround.map(Math.round).join(',') + ')');
      skyCtx.fillStyle = grad;
      skyCtx.fillRect(0, 0, w, h);

      // Sun with halo and rays
      const sunX = w * 0.3 + w * 0.4 * Math.cos(cycle * Math.PI * 2 - Math.PI / 2);
      const sunY = h * 0.7 - h * 0.5 * Math.sin(cycle * Math.PI * 2 - Math.PI / 2);

      if (cycle > 0.15 && cycle < 0.85) {
        const sunAlpha = Math.sin((cycle - 0.15) / 0.7 * Math.PI) * 0.9;
        // Outer glow
        const glowGrad = skyCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 160);
        glowGrad.addColorStop(0, 'rgba(255,255,200,' + (sunAlpha * 0.25) + ')');
        glowGrad.addColorStop(0.5, 'rgba(255,220,150,' + (sunAlpha * 0.1) + ')');
        glowGrad.addColorStop(1, 'rgba(255,200,100,0)');
        skyCtx.fillStyle = glowGrad;
        skyCtx.beginPath();
        skyCtx.arc(sunX, sunY, 160, 0, Math.PI * 2);
        skyCtx.fill();
        // Sun body
        const sunGrad = skyCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 35);
        sunGrad.addColorStop(0, 'rgba(255,255,240,' + sunAlpha + ')');
        sunGrad.addColorStop(0.6, 'rgba(255,240,180,' + (sunAlpha * 0.8) + ')');
        sunGrad.addColorStop(1, 'rgba(255,200,100,' + (sunAlpha * 0.3) + ')');
        skyCtx.fillStyle = sunGrad;
        skyCtx.beginPath();
        skyCtx.arc(sunX, sunY, 35, 0, Math.PI * 2);
        skyCtx.fill();
        // Rays
        skyCtx.save();
        skyCtx.globalAlpha = sunAlpha * 0.08;
        for (let i = 0; i < 24; i++) {
          const a = (i / 24) * Math.PI * 2 + t * 0.2;
          const len = 120 + Math.sin(i * 3 + t) * 30;
          skyCtx.beginPath();
          skyCtx.moveTo(sunX + Math.cos(a) * 40, sunY + Math.sin(a) * 40);
          skyCtx.lineTo(sunX + Math.cos(a) * len, sunY + Math.sin(a) * len);
          skyCtx.strokeStyle = 'rgba(255,255,200,0.4)';
          skyCtx.lineWidth = 2;
          skyCtx.stroke();
        }
        skyCtx.restore();
      }

      // Stars with twinkling
      if (isNight || isDawn || isDusk) {
        const starAlpha = isNight ? 1 : 0.4;
        for (let i = 0; i < 100; i++) {
          const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * w;
          const sy = (Math.sin(i * 311.7) * 0.5 + 0.5) * h * 0.6;
          const twinkle = Math.sin(t * 3 + i * 1.7) * 0.5 + 0.5;
          const sa = twinkle * starAlpha * 0.8;
          const size = 0.8 + twinkle * 0.8;
          skyCtx.fillStyle = 'rgba(255,255,230,' + sa + ')';
          skyCtx.beginPath();
          skyCtx.arc(sx, sy, size, 0, Math.PI * 2);
          skyCtx.fill();
          if (twinkle > 0.7 && starAlpha > 0.6) {
            skyCtx.fillStyle = 'rgba(255,255,230,' + (sa * 0.3) + ')';
            skyCtx.beginPath();
            skyCtx.arc(sx, sy, size * 3, 0, Math.PI * 2);
            skyCtx.fill();
          }
        }
      }

      // Clouds on canvas
      const clouds = [
        { x: 0.1, y: 0.08, s: 1.0, spd: 0.008 },
        { x: 0.35, y: 0.15, s: 1.3, spd: 0.005 },
        { x: 0.6, y: 0.06, s: 0.9, spd: 0.01 },
        { x: 0.85, y: 0.18, s: 1.1, spd: 0.007 },
        { x: 0.2, y: 0.25, s: 0.8, spd: 0.009 },
        { x: 0.5, y: 0.22, s: 1.2, spd: 0.006 },
        { x: 0.75, y: 0.1, s: 0.7, spd: 0.011 },
        { x: 0.95, y: 0.28, s: 1.0, spd: 0.008 },
      ];
      clouds.forEach(cl => {
        let cx = ((cl.x + t * cl.spd) % 1.3) - 0.15;
        cx *= w;
        const cy = cl.y * h;
        const s = cl.s;
        const ca = isNight ? 0.12 : 0.5;
        const c = isNight ? 'rgba(40,50,70,' + ca + ')' : 'rgba(255,255,255,' + ca + ')';
        skyCtx.fillStyle = c;
        skyCtx.beginPath();
        skyCtx.ellipse(cx, cy, 60 * s, 22 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx - 30 * s, cy + 5 * s, 35 * s, 18 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx + 35 * s, cy + 3 * s, 40 * s, 20 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.beginPath();
        skyCtx.ellipse(cx + 5 * s, cy - 15 * s, 45 * s, 20 * s, 0, 0, Math.PI * 2);
        skyCtx.fill();
      });

      // Mountains - 4 layers with snow
      const mBase = h * 0.68;

      const drawMountain = (baseY, amp1, amp2, freq1, freq2, color, snowColor) => {
        skyCtx.fillStyle = color;
        skyCtx.beginPath();
        skyCtx.moveTo(0, baseY + amp1);
        for (let x = 0; x <= w; x += 2) {
          const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2;
          skyCtx.lineTo(x, y);
        }
        skyCtx.lineTo(w, h); skyCtx.lineTo(0, h); skyCtx.fill();
        // Snow caps
        if (snowColor) {
          skyCtx.save();
          skyCtx.globalAlpha = 0.6;
          skyCtx.fillStyle = snowColor;
          skyCtx.beginPath();
          for (let x = 0; x <= w; x += 2) {
            const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2;
            if (x === 0) skyCtx.moveTo(x, y);
            else skyCtx.lineTo(x, y);
          }
          for (let x = w; x >= 0; x -= 2) {
            const y = baseY + Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2 + 8;
            skyCtx.lineTo(x, y);
          }
          skyCtx.closePath();
          skyCtx.fill();
          skyCtx.restore();
        }
      };

      drawMountain(mBase, 45, 20, 0.0015, 0.004,
        isNight ? 'rgba(15,20,35,0.75)' : 'rgba(90,120,110,0.45)',
        isNight ? 'rgba(200,210,230,0.15)' : 'rgba(255,255,255,0.35)');

      drawMountain(mBase + 40, 38, 18, 0.0025, 0.006,
        isNight ? 'rgba(18,28,42,0.8)' : 'rgba(65,105,75,0.5)',
        isNight ? 'rgba(180,200,220,0.1)' : 'rgba(255,255,255,0.25)');

      drawMountain(mBase + 75, 30, 15, 0.0035, 0.008,
        isNight ? 'rgba(22,35,50,0.85)' : 'rgba(50,90,60,0.55)', null);

      drawMountain(mBase + 100, 22, 12, 0.004, 0.01,
        isNight ? 'rgba(28,40,55,0.9)' : 'rgba(40,80,50,0.6)', null);

      // Fog/haze between mountains
      const fogGrad = skyCtx.createLinearGradient(0, mBase + 60, 0, mBase + 130);
      const fogA = isNight ? 0.08 : 0.15;
      fogGrad.addColorStop(0, 'rgba(200,220,240,0)');
      fogGrad.addColorStop(0.5, 'rgba(200,220,240,' + fogA + ')');
      fogGrad.addColorStop(1, 'rgba(200,220,240,0)');
      skyCtx.fillStyle = fogGrad;
      skyCtx.fillRect(0, mBase + 60, w, 70);

      // Trees - round tops with variety
      const treeBase = mBase + 110;
      for (let i = 0; i < 40; i++) {
        const tx = (i / 40) * w + Math.sin(i * 7.3) * 25;
        const th = 22 + Math.sin(i * 3.1) * 12;
        const tw = 10 + Math.sin(i * 5.7) * 5;
        const ty = treeBase + Math.sin(i * 2.3) * 8;

        skyCtx.fillStyle = isNight ? 'rgba(25,20,15,0.9)' : 'rgba(80,55,35,0.85)';
        skyCtx.fillRect(tx - 1.5, ty, 3, th * 0.45);

        const colors = isNight
          ? [[18,35,20],[22,42,25],[15,30,18]]
          : [[40+Math.sin(i)*20, 110+Math.sin(i*2)*30, 55], [55+Math.sin(i)*15, 130+Math.sin(i*3)*20, 65], [35+Math.sin(i)*10, 95+Math.sin(i)*25, 50]];

        for (let j = 0; j < 3; j++) {
          const cy2 = ty - j * th * 0.22;
          const cr = tw * (1 - j * 0.15);
          skyCtx.fillStyle = 'rgba(' + colors[j].map(Math.round).join(',') + ',0.88)';
          skyCtx.beginPath();
          skyCtx.ellipse(tx, cy2, cr, cr * 0.8, 0, 0, Math.PI * 2);
          skyCtx.fill();
        }
      }

      // Grass field
      const grassY = mBase + 125;
      const grassGrad = skyCtx.createLinearGradient(0, grassY, 0, grassY + 30);
      if (isNight) {
        grassGrad.addColorStop(0, 'rgba(15,30,18,0.7)');
        grassGrad.addColorStop(1, 'rgba(10,20,12,0.8)');
      } else {
        grassGrad.addColorStop(0, 'rgba(60,130,60,0.5)');
        grassGrad.addColorStop(1, 'rgba(45,100,45,0.6)');
      }
      skyCtx.fillStyle = grassGrad;
      skyCtx.fillRect(0, grassY, w, 30);

      // Grass blades
      skyCtx.strokeStyle = isNight ? 'rgba(30,60,35,0.5)' : 'rgba(70,150,70,0.4)';
      skyCtx.lineWidth = 1;
      for (let i = 0; i < 80; i++) {
        const gx = (i / 80) * w + Math.sin(i * 5) * 8;
        const gy = grassY + Math.sin(i * 3) * 3;
        const gh = 6 + Math.sin(i * 2) * 4;
        const sway = Math.sin(t * 2 + i * 0.5) * 3;
        skyCtx.beginPath();
        skyCtx.moveTo(gx, gy);
        skyCtx.quadraticCurveTo(gx + sway, gy - gh * 0.6, gx + sway * 1.5, gy - gh);
        skyCtx.stroke();
      }

      // Flowers
      if (!isNight) {
        for (let i = 0; i < 15; i++) {
          const fx = (i / 15) * w + Math.sin(i * 11) * 40;
          const fy = grassY + 5 + Math.sin(i * 4) * 5;
          const fc = ['rgba(255,180,180,0.7)', 'rgba(255,255,180,0.7)', 'rgba(200,180,255,0.7)', 'rgba(255,200,220,0.7)'][i % 4];
          skyCtx.fillStyle = fc;
          for (let p = 0; p < 5; p++) {
            const pa = (p / 5) * Math.PI * 2;
            skyCtx.beginPath();
            skyCtx.ellipse(fx + Math.cos(pa) * 3, fy + Math.sin(pa) * 3, 2.5, 1.5, pa, 0, Math.PI * 2);
            skyCtx.fill();
          }
          skyCtx.fillStyle = 'rgba(255,255,100,0.8)';
          skyCtx.beginPath();
          skyCtx.arc(fx, fy, 1.5, 0, Math.PI * 2);
          skyCtx.fill();
        }
      }

      // Water at bottom
      const waterY = h - 35;
      const waterGrad = skyCtx.createLinearGradient(0, waterY, 0, h);
      if (isNight) {
        waterGrad.addColorStop(0, 'rgba(8,12,25,0.7)');
        waterGrad.addColorStop(1, 'rgba(5,8,18,0.85)');
      } else {
        const wr = Math.round(cBot[0] * 0.4 + 60);
        const wg = Math.round(cBot[1] * 0.4 + 100);
        const wb = Math.round(cBot[2] * 0.4 + 120);
        waterGrad.addColorStop(0, 'rgba(' + wr + ',' + wg + ',' + wb + ',0.4)');
        waterGrad.addColorStop(1, 'rgba(' + Math.round(wr * 0.7) + ',' + Math.round(wg * 0.7) + ',' + Math.round(wb * 0.7) + ',0.6)');
      }
      skyCtx.fillStyle = waterGrad;
      skyCtx.fillRect(0, waterY, w, 35);

      // Water ripples with sky reflection
      for (let i = 0; i < 6; i++) {
        const ry2 = waterY + 3 + i * 5;
        const alpha = isNight ? 0.06 : 0.12 - i * 0.015;
        skyCtx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        skyCtx.lineWidth = 0.8;
        skyCtx.beginPath();
        for (let x = 0; x <= w; x += 3) {
          const y2 = ry2 + Math.sin(x * 0.018 + t * 1.5 + i * 1.2) * 1.8;
          x === 0 ? skyCtx.moveTo(x, y2) : skyCtx.lineTo(x, y2);
        }
        skyCtx.stroke();
      }

      // Moon at night
      if (isNight) {
        const moonX = w * 0.75;
        const moonY = h * 0.15;
        const moonGlow = skyCtx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 60);
        moonGlow.addColorStop(0, 'rgba(220,230,255,0.15)');
        moonGlow.addColorStop(1, 'rgba(200,210,240,0)');
        skyCtx.fillStyle = moonGlow;
        skyCtx.beginPath();
        skyCtx.arc(moonX, moonY, 60, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.fillStyle = 'rgba(230,235,250,0.85)';
        skyCtx.beginPath();
        skyCtx.arc(moonX, moonY, 18, 0, Math.PI * 2);
        skyCtx.fill();
        skyCtx.fillStyle = isNight ? 'rgba(15,20,35,1)' : 'rgba(0,0,0,0)';
        skyCtx.beginPath();
        skyCtx.arc(moonX + 5, moonY - 3, 16, 0, Math.PI * 2);
        skyCtx.fill();
      }

      // Fireflies at night
      if (isNight) {
        for (let i = 0; i < 20; i++) {
          const fx = (Math.sin(i * 83.7 + t * 0.3) * 0.5 + 0.5) * w;
          const fy = (Math.sin(i * 191.3 + t * 0.2) * 0.5 + 0.5) * h * 0.5 + h * 0.3;
          const fa = (Math.sin(t * 4 + i * 2.1) * 0.5 + 0.5) * 0.7;
          skyCtx.fillStyle = 'rgba(255,255,150,' + fa + ')';
          skyCtx.beginPath();
          skyCtx.arc(fx, fy, 2, 0, Math.PI * 2);
          skyCtx.fill();
          skyCtx.fillStyle = 'rgba(255,255,150,' + (fa * 0.2) + ')';
          skyCtx.beginPath();
          skyCtx.arc(fx, fy, 6, 0, Math.PI * 2);
          skyCtx.fill();
        }
      }
    }

    const birdParticles = [];
    const floatingParticles = [];

    let skyTime = 0;
    let birdTime = 0;

    function loop() {
      skyTime += 0.001 * speedMultiplier;
      birdTime += 0.005 * speedMultiplier;
      drawSky(skyTime);

      const cx = vw / 2, cy = vh / 2;
      const rx = vw * 0.35, ry = vh * 0.25;
      const birdX = cx + Math.cos(birdTime) * rx;
      const birdY = cy + Math.sin(birdTime * 2) * ry;
      const goingRight = Math.sin(birdTime) < 0;
      const goingUp = Math.cos(birdTime * 2) < 0;
      const tilt = goingUp ? -10 : 10;
      const scaleX = goingRight ? 1 : -1;

      birdCanvas.style.left = (birdX - SIZE / 2) + 'px';
      birdCanvas.style.top = (birdY - SIZE / 2) + 'px';
      birdCanvas.style.transform = 'scaleX(' + scaleX + ') rotate(' + (goingRight ? tilt : -tilt) + 'deg)';

      stripCtx.clearRect(0, 0, SIZE, SIZE);
      stripCtx.drawImage(riveCanvas, 0, 0, SIZE, SIZE);
      const img = stripCtx.getImageData(0, 0, SIZE, SIZE);
      const d = img.data;

      if (!bgColor) {
        for (let i = 0; i < d.length; i += 4) {
          if (d[i+3] > 10) { bgColor = [d[i], d[i+1], d[i+2]]; break; }
        }
      }
      if (bgColor) {
        const [br, bg, bb] = bgColor;
        for (let i = 0; i < d.length; i += 4) {
          if (d[i+3] > 0 && Math.abs(d[i]-br) < 25 && Math.abs(d[i+1]-bg) < 25 && Math.abs(d[i+2]-bb) < 25) {
            d[i+3] = 0;
          }
        }
      }

      birdCtx.clearRect(0, 0, SIZE, SIZE);
      birdCtx.putImageData(img, 0, 0);

      if (Math.random() < 0.3) {
        birdParticles.push({
          x: birdX + (Math.random() - 0.5) * 30,
          y: birdY + (Math.random() - 0.5) * 30,
          size: Math.random() * 4 + 2,
          alpha: 0.5,
          life: 1,
        });
        if (birdParticles.length > 20) birdParticles.shift();
      }

      trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
      for (let i = birdParticles.length - 1; i >= 0; i--) {
        const p = birdParticles[i];
        p.life -= 0.015; p.alpha = p.life * 0.35; p.size *= 0.99; p.y -= 0.2;
        if (p.life <= 0) { birdParticles.splice(i, 1); continue; }
        trailCtx.beginPath();
        trailCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        trailCtx.fillStyle = 'rgba(255,220,120,' + p.alpha + ')';
        trailCtx.fill();
      }

      if (Math.random() < 0.08) {
        floatingParticles.push({
          x: Math.random() * vw, y: vh + 10,
          size: Math.random() * 3 + 1, alpha: Math.random() * 0.3 + 0.1,
          vx: (Math.random() - 0.5) * 0.3, vy: -(Math.random() * 0.4 + 0.2), life: 1,
        });
        if (floatingParticles.length > 50) floatingParticles.shift();
      }

      particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      for (let i = floatingParticles.length - 1; i >= 0; i--) {
        const p = floatingParticles[i];
        p.x += p.vx + Math.sin(time * 3 + i) * 0.15;
        p.y += p.vy; p.life -= 0.003; p.alpha = p.life * 0.3;
        if (p.life <= 0 || p.y < -10) { floatingParticles.splice(i, 1); continue; }
        particleCtx.beginPath();
        particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        particleCtx.fillStyle = 'rgba(255,255,255,' + p.alpha + ')';
        particleCtx.fill();
      }

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    const speeds = [0.5, 1, 1.5, 2];
    let speedIdx = 1;
    document.getElementById('speed-btn').addEventListener('click', () => {
      speedIdx = (speedIdx + 1) % speeds.length;
      speedMultiplier = speeds[speedIdx];
      document.getElementById('speed-btn').textContent = speeds[speedIdx] + 'x';
    });
  </script>
</body>
</html>
